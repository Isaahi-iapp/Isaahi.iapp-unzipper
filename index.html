<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iApp Live Previewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --apple-blue: #007aff; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            background: #f2f2f7; 
            color: #1c1c1e; 
            overflow: hidden; 
        }
        header { 
            padding: 16px 20px; 
            background: rgba(255,255,255,0.8); 
            backdrop-filter: blur(20px); 
            border-bottom: 0.5px solid #d1d1d6; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            z-index: 10; 
        }
        .upload-btn { 
            background: var(--apple-blue); 
            color: white; 
            padding: 10px 24px; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 15px; 
        }
        #file-input { display: none; }
        .info { font-size: 13px; color: #8e8e93; font-weight: 500; }
        #viewer { 
            flex-grow: 1; 
            border: none; 
            background: white; 
            width: 100%; 
        }
        .empty-state { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            text-align: center; 
            width: 80%; 
        }
    </style>
</head>
<body>

<header>
    <label class="upload-btn">
        Select .iapp
        <input type="file" id="file-input" accept="*/*">
    </label>
    <div id="status" class="info">Ready to Preview</div>
</header>

<div id="container" style="flex-grow: 1; position: relative; display: flex;">
    <div id="empty" class="empty-state">
        <h2 style="margin-bottom: 8px;">No App Loaded</h2>
        <p style="color: #8e8e93; margin: 0;">Select your .iapp file from the Downloads folder.</p>
    </div>
    <iframe id="viewer" style="display:none;"></iframe>
</div>

        const file = e.target.files[0];
